<!DOCTYPE html>
<html>
<head>
<title>Doctor Dashboard - Left Hospital</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<header class="navbar">
<span class="hospital-name">Left Hospital</span>

<ul class="menu">
<li><a href="/home">Home</a></li>
<li><a href="/logout" style="color:red;">Logout</a></li>
</ul>
</header>

<section class="section">

<h2 style="color:#0b4f8a;">Doctor Appointments</h2>

<button onclick="loadAppointments()">View Appointments</button>

<div id="appointments" style="margin-top:25px;"></div>

</section>

<footer>
© 2026 Left Hospital. All Rights Reserved.
</footer>

<script>

function loadAppointments(){

fetch("/appointments")
.then(res => res.json())
.then(data => {

let html = "";

if(data.length === 0){
html = "<p>No appointments available</p>";
}
else{

data.forEach(app => {

let color = "green";

if(app.risk_level === "High Risk"){
color = "red";
}
else if(app.risk_level === "Medium Risk"){
color = "orange";
}

html += `
<div style="border-left:6px solid ${color}; padding:15px; margin-bottom:15px; background:#f9f9f9; border-radius:8px;">

<p><b>Patient Name:</b> ${app.patient_name}</p>

<p><b>Risk Level:</b>
<span style="color:${color}; font-weight:600;">
${app.risk_level}
</span>
</p>

<p><b>Priority:</b> ${app.priority}</p>

<p><b>Status:</b> ${app.status}</p>

<p><b>Symptoms:</b> ${app.symptoms.join(", ")}</p>

<button onclick="completeAppointment(${app.id})"
style="margin-top:10px;background:#0b4f8a;color:white;">
Complete Consultation
</button>

</div>
`;

});

}

document.getElementById("appointments").innerHTML = html;

})
.catch(error => {
console.log(error)
document.getElementById("appointments").innerHTML =
"<p style='color:red;'>Error loading appointments</p>";
});

}


function completeAppointment(id){

if(!confirm("Mark consultation as completed?")) return;

fetch(`/complete-appointment/${id}`,{
method:"PUT"
})
.then(res => res.json())
.then(data => {

alert(data.message)

loadAppointments()

})

}

</script>

</body>
</html>
